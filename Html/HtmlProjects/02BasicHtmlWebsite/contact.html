<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
  </head>
  <body>
		<header>
			<h3> Alina Y. Lu </h3>
			<nav>
				<ul>
					<li><a href="home.html">Home</a></li>
					<li><a href="contact.html">Contact</a></li>
					<li><a href="projects.html">Projects</a></li>
				</ul>
			</nav>
		</header>
		<main>
      <form action="/send" method="post">
				<p>
					<label for="name">Name</label>
					<input id="name" name="name" type="text" required placeholder="Jane Doe">
				</p>
				<p>
					<label for="email">Email</label>
					<input id="email" name="email" type="email" required placeholder="test@email.com">
				</p>
				<p>
					<label for="message">Message</label>
					<textarea id="message" name="message" rows=4 required placeholder="Your message here"></textarea>
				</p>
				<p>
					<button type="submit">Send</button>
				</p>
      </form>
		</main>
		<footer>
			<p>&copy; all rights reserved 2026</p>
		</footer>
	</body>
