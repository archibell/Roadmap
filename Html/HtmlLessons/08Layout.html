<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layout practice</title>
  </head>
  
  <body>
    <header>
        <h1>My blog</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <main>
      <article>
        <h2>An interesting post</h2>
        <p>A paragraph of post content.</p>
      </article>
      <aside>
        <h2>Related</h2>
        <p>Links to other posts.</p>
      </aside>
    </main>

    <footer>
        <p>© 2026 My blog</p>
    </footer>

  </body>
</html>
