<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weekly schedule</title>
  </head>
  <body>
    <h1>Basic Structure</h1>
    <table>
      <tr>
        <th>Plan</th>
        <th>Price</th>
        <th>Users</th>
      </tr>
      <tr>
        <td>Starter</td>
        <td>$9</td>
        <td>1</td>
      </tr>
      <tr>
        <td>Team</td>
        <td>$29</td>
        <td>5</td>
      </tr>
    </table>
    
    <h1>This week</h1>
    <table>
      <caption>Study schedule</caption>
      <thead>
        <tr>
          <th scope="col">Day</th>
          <th scope="col">Topic</th>
          <th scope="col">Hours</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Monday</th>
          <td>HTML basics</td>
          <td>2</td>
        </tr>
        <tr>
          <th scope="row">Tuesday</th>
          <td>Links and forms</td>
          <td>3</td>
        </tr>
        <tr>
          <th scope="row">Wednesday</th>
          <td>Practice project</td>
          <td>2</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
