<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- title = browser tab title-->
    <title>03Text&ContentStructure_About</title>
  </head>
  <body>
    <h1>03 Text & Content Structure - About</h1>
    <!-- A paragraph is written with the <p> element-->
    <p>One short paragraph introducing yourself.</p>
    <h2>What I'm learning</h2>
    <!-- ul = unordered list, ie bullet points -->
    <ul>
      <!-- li = list items -->
      <li>HTML basics</li>
      <li>Text and content structure</li>
    </ul>
    <h2>A quote I like</h2>
    <!-- <blockquote> is for longer, block-level quotes. Browsers usually indent it from the surrounding text. -->
    <blockquote>
      <!-- <b> for bold, <i> for italicize -->
      <p>Put your <b>favorite quote</b> here - <i>"good morning"</i>.</p>
    </blockquote>

    <!-- mark = highlight text -->
    <h2><mark>Tools I use:</mark></h2>

    <!-- ol = ordered list, ie numbered list -->
    <ol>
      <!-- li = list items -->
      <li>knife</li>
      <li>fork</li>
      <li>spoon</li>
    </ol>

  </body>
</html>
