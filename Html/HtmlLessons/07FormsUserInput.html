<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form practice</title>
  </head>
  <body>
    <h1>Sign up</h1>
    <form action="/signup" method="post">

      <p>
        <label>
          Date
          <input type="date" name="date">
        </label>
      </p>
  
      <p>
        <label>
          Time
          <input type="time" name="time">
        </label>
      </p>

      <p>
        <label>
          Email address
          <input type="email" name="email" placeholder="test@email.com">
        </label>
      </p>

      <p>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="test@email.com">
      </p>

      <p>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="8" required>
      </p>

      <p>
        <label>
          <input type="checkbox" name="newsletter" value="yes">
          Send me product updates
        </label>
      </p>

      <p>
        <fieldset>
          <legend>Choose a plan</legend>
          <label><input type="radio" name="plan" value="starter"> Starter</label>
          <label><input type="radio" name="plan" value="team"> Team</label>
          <label><input type="radio" name="plan" value="business"> Business</label>
        </fieldset>
      </p>

      <p>
        <label for="bio">Short bio</label>
        <textarea id="bio" name="bio" rows="4"></textarea>
      </p>

      <p>
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">Choose a country</option>
          <option value="us">United States</option>
          <option value="ca">Canada</option>
          <option value="uk">United Kingdom</option>
        </select>
      </p>

      <p>
        <button type="submit">Create account</button>
      </p>

    </form>

    <form action="/upload" method="post" enctype="multipart/form-data">
      <label for="avatar">Profile picture</label>
      <input type="file" id="avatar" name="avatar">
      <button type="submit">Upload</button>
    </form>

    <form action="/upload" method="post" enctype="multipart/form-data">
      <label for="avatar">Profile picture</label>
      <input type="file" name="photos" multiple accept="image/*">
      <button type="submit">Upload</button>
    </form>

  </body>
</html>
