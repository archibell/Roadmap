<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1B Intro To CSS</title>
    <!--
    The <link> element tells the browser to load style.css and treat it as a stylesheet. The href value is the path to the CSS file, just like an image src is the path to an image.
    -->
    <link rel="stylesheet" href="01bIntroToCss_Style.css">
  </head>
  <body>
    <main class="page">
      <h1>1B Intro To CSS</h1>
      <p class="lead">This page starts as plain HTML, then CSS changes how it looks.</p>
      <article class="card">
        <h2>Practice card</h2>
        <p>CSS can add space, color, borders, and rounded corners to the same HTML.</p>
        <button>Save changes</button>
      </article>
    </main>
  </body>
</html>
