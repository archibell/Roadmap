<!--
Work with a form that has real states:
  - Use a support request form. It has text inputs, a select menu, a textarea, a checkbox, a submit button, a disabled button, a hint, and an error state. That mix is useful because form styling is not only about one <input>. Real forms have groups, labels, messages, choices, and actions.
-->
<!--
The HTML already does important form work:
  - Each main control has a <label>.
  - autocomplete helps the browser suggest the right saved values for name and email fields.
  - The email field has hint and error text.
  - aria-invalid and aria-describedby help connect the email field to its error and hint text for assistive technology.
  - The checkbox stays a real checkbox.
  - The disabled button uses the real disabled attribute.
CSS should improve that structure, not replace it.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Styling Forms Practice</title>
    <link rel="stylesheet" href="18StylingForms_Style.css">
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">CSS practice</p>
        <h1>Style a form people can actually use</h1>
        <p class="summary">The form should feel calm, readable, and clear in its normal, focused, error, and disabled states.</p>
      </section>

      <form class="support-form" action="/support" method="post">
        <div class="field">
          <!--
          Each main control has a <label>.
          -->
          <label for="full-name">Full name</label>
          <!--
          autocomplete helps the browser suggest the right saved values for name and email fields.
          -->
          <input id="full-name" name="full-name" type="text" autocomplete="name" placeholder="Ada Lovelace">
        </div>

        <div class="field has-error">
          <label for="email">Email address</label>
          <!--
          aria-invalid and aria-describedby help connect the email field to its error and hint text for assistive technology.
          -->
          <input id="email" name="email" type="email" autocomplete="email" aria-invalid="true" aria-describedby="email-hint email-error" placeholder="ada@example.com">
          <!--
          The email field has hint and error text.
          -->
          <p class="field-hint" id="email-hint">Use the email address where we can reach you.</p>
          <p class="field-error" id="email-error">Enter a valid email address.</p>
        </div>

        <div class="field">
          <label for="topic">Topic</label>
          <select id="topic" name="topic">
            <option value="">Choose a topic</option>
            <option value="layout">Layout problem</option>
            <option value="forms">Form styling</option>
            <option value="accessibility">Accessibility question</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us what happened"></textarea>
        </div>

        <label class="check-field">
          <!--
          The checkbox stays a real checkbox.
          -->
          <input type="checkbox" name="updates">
          <span>Send me updates about this request.</span>
        </label>

        <div class="form-actions">
          <button type="submit">Send request</button>
          <!--
          The disabled button uses the real disabled attribute.
          -->
          <button class="secondary-button" type="button" disabled>Save draft</button>
        </div>
      </form>
    </main>
  </body>
</html>
